<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chocolate & Strawberry Tic-Tac-Toe</title>

  <link rel="stylesheet" href="tempstyle.css">
</head>
<body>
  
  <div class="outside-container">
    <div class="container">

      <h1><span class="chocolate">chocolate</span> & <span class="strawberry">strawberry</span> <br> Tic-Tac-Toe</h1>
  
      <div id="start" class="start">
        <div class="buttons">
          <button id="computer-play">Play with a computer</button>
          <button id="friend-play">Play with a friend</button>
        </div>
  
        <div class="note">
          Note: The Play with a Friend option is intended for local play only. Players take turns on the same device.
        </div>
      </div>
  
      <div id="choose-move" class="pick-move-computer hide">
        <h1>Chocolate or Strawberry?</h1>
        <div class="buttons">
          <button id="chocolate-move">Chocolate</button>
          <button id="strawberry-move">Strawberry</button>
        </div>
      </div>
  
      <div id="tictactoe" class="tictactoe-container hide">
        
        <div class="top">
          <button id="exit"><</button>
          <p class="turn-indicator">
            <span class="turn"></span> turn.
          </p>
        </div>
  
        <div class="tictactoe">
          <div data-box="1" class="cell"></div>
          <div data-box="2" class="cell"></div>
          <div data-box="3" class="cell"></div>
          <div data-box="4" class="cell"></div>
          <div data-box="5" class="cell"></div>
          <div data-box="6" class="cell"></div>
          <div data-box="7" class="cell"></div>
          <div data-box="8" class="cell"></div>
          <div data-box="9" class="cell"></div>
        </div>
      </div>
  
      <a href="https://github.com/pwrsi" class="link">made by pwrsi 𐙚</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
