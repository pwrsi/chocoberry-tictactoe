<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chocoberry tic-tac-toe ⋆˚࿔</title>

  <link rel="stylesheet" href="tempstyle.css">
</head>
<body>
  
  <div class="outside-container">
    <div class="container">

      <h1>chocoberry tic-tac-toe</h1>
  
      <div id="start-panel" class="start-panel">
        <div class="buttons">
          <button id="computer-play">Play with a computer</button>
          <button id="friend-play">Play with a friend</button>
        </div>
  
      </div>
  
      <div id="difficulty-panel" class="difficulty-panel hide">
        <h1>Select difficulty</h1>
        <div class="buttons">
          <button data-difficulty-id="1" id="easy" class="difficulty">Easy</button>
          <button data-difficulty-id="2" id="medium" class="difficulty">Medium</button>
          <button data-difficulty-id="3" id="hard" class="difficulty">Hard</button>
        </div>
      </div>
  
      <div id="game-panel" class="game-container hide">
        <div class="top">
          <div>
            <button id="exit"><</button>
            <select name="difficulty" id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <div>
            <p class="turn-indicator">
              <span class="turn" id="turn"></span> turn.
            </p>

            <button id="restart-button" class="restart">Restart game</button>
          </div>
        </div>
  
        <div class="game">
          <div data-box="1" class="box js-box-1"></div>
          <div data-box="2" class="box js-box-2"></div>
          <div data-box="3" class="box js-box-3"></div>
          <div data-box="4" class="box js-box-4"></div>
          <div data-box="5" class="box js-box-5"></div>
          <div data-box="6" class="box js-box-6"></div>
          <div data-box="7" class="box js-box-7"></div>
          <div data-box="8" class="box js-box-8"></div>
          <div data-box="9" class="box js-box-9"></div>
        </div>

        <div class="score-container">
          <p>x: <span id="x-wins">0</span></p>
          <p>tie: <span id="tie">0</span></p>
          <p>o: <span id="o-wins">0</span></p>
        </div>
      </div>
  
      <a href="https://github.com/pwrsi" class="link">made by pwrsi 𐙚</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
